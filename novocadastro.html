    <!-- Animação -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <link rel="stylesheet" href="./assets/css/header.css">
    <link rel="stylesheet" href="./assets/css/body.css">
    <link rel="stylesheet" href="./assets/css/footer.css">

    <title>Novo Cadastro - EcoCiclo</title>
</head>

<body>
    <!-- NAVBAR -->
    <header class="header">
        <article class="menu_container flex">
            <div id="titulo">
                <img src="./assets/img/icone.svg" alt="Ícone EcoCiclo" class="logo">
                <a href="index.html" class="text-success fw-bold fs-3">EcoCiclo</a>
            </div>
            <nav>
                <ul class="flex menu_list">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="ecopontos.html">Ecopontos</a></li>
                    <li><a href="faleconosco.html">Contato</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="painelrecicla.html" class="btn btn-success">PainelRecicla</a></li>
                </ul>
            </nav>
        </article>
    </header>

    <main style="padding-top: 10px;"> <!-- ajusta padding pelo fixed-top -->
        <section style="padding-top: 20px; padding-bottom: 120px; background-color: #fff;">
            <div class="container">
                <div class="row align-items-center justify-content-center">

                    <!-- Formulário de cadastro -->
                    <div class="col-lg-5 mb-lg-0">
                        <h2 class="text-success fw-bold text-center mb-4">Novo Cadastro</h2>
                        <p class="text-muted text-center mb-4">
                            Crie sua conta para gerenciar pontos de coleta e monitorar os sensores.
                        </p>

                        <!-- Formulário: futuramente conectará com PHP -->
                        <form action="cadastrar-usuario.php" method="POST">
                            <!-- Nome -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="name" name="name"
                                    placeholder="Seu nome completo" required>
                            </div>

                            <!-- CPF -->
                            <div class="mb-3">
                                <label for="name" class="form-label">CPF</label>
                                <input type="text" class="form-control" id="name" name="name"
                                    placeholder="Digite o número do seu CPF" required>
                            </div>

                            <!-- Empresa -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Nome da empresa</label>
                                <input type="text" class="form-control" id="name" name="name"
                                    placeholder="" required>
                            </div>

                            <!-- Função na empresa -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Função na empresa</label>
                                <input type="text" class="form-control" id="name" name="name"
                                    placeholder="" required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="Seu email"
                                    required>
                            </div>

                            <!-- Senha -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Sua senha" required>
                            </div>

                            <!-- Confirmação de senha -->
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Confirme a Senha</label>
                                <input type="password" class="form-control" id="confirm_password"
                                    name="confirm_password" placeholder="Confirme sua senha" required>
                            </div>

                            <!-- Botão de cadastro -->
                            <div class="d-grid mt-3">
                                <button type="submit" class="btn btn-success btn-lg">Cadastrar</button>
                            </div>

                            <!-- Link para login -->
                            <div class="text-center mt-3">
                                <a href="login.html" class="btn btn-link text-success" style="font-size: 16px;">Já
                                    possui conta? Login</a>
                            </div>
                        </form>
                    </div>

                    <!-- Imagem do galho de folha -->
                    <div class="col-lg-5 text-center px-4">
                        <img src="./assets/img/folha.png" alt="Galho de folha" class="img-fluid"
                            style="max-height: 400px; margin-left: 80px; margin-top: 100px;">
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER PADRÃO -->
    <footer class="footer bg-success text-white py-5">
        <div class="container">
            <div class="row align-items-center">

                <!-- Coluna esquerda: redes sociais -->
                <div class="col-md-4 d-flex flex-column align-items-center mb-4 mb-md-0">
                    <h4 class="fw-bold mb-3">Junte-se à comunidade</h4>
                    <div class="d-flex gap-3 social-icons">
                        <a href="#"><img src="./assets/img/facebook-logo.svg" alt="Facebook" class="social-icon"></a>
                        <a href="#"><img src="./assets/img/instagram-logo.svg" alt="Instagram" class="social-icon"></a>
                        <a href="#"><img src="./assets/img/twitter-logo.svg" alt="Twitter" class="social-icon"></a>
                    </div>
                </div>

                <!-- Coluna central: vazia -->
                <div class="col-md-4 d-flex justify-content-center"></div>

                <!-- Coluna direita: EcoCiclo -->
                <div class="col-md-4 d-flex flex-column align-items-center">
                    <h3 class="fw-bold mb-2">
                        <img src="./assets/img/tree-branco.svg" alt="Ícone EcoCiclo" class="logo me-2">
                        EcoCiclo
                    </h3>
                    <p class="mb-0 text-center">Monitoramento inteligente para coleta eficiente</p>
                </div>

            </div>
        </div>
    </footer>
</body>

</html>
