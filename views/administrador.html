    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const alertas = [
            { ponto: "Ponto A", nivel: 85 },
            { ponto: "Ponto B", nivel: 92 }
        ];

        const tabela = document.getElementById("tabelaAlertas");

        alertas.forEach(a => {
            tabela.innerHTML += `
        <tr>
          <td>${a.ponto}</td>
          <td>${a.nivel}%</td>
          <td class="text-danger">Crítico</td>
          <td><button class="btn btn-sm btn-success">Coletado</button></td>
        </tr>
      `;
        });

        function baixarCSV() {
            let csv = "Ponto,Nível\n";
            alertas.forEach(a => csv += `${a.ponto},${a.nivel}%\n`);

            const blob = new Blob([csv], { type: "text/csv" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "relatorio-ecociclo.csv";
            link.click();
        }
    </script>
